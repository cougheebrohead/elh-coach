<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log in — ELH Coach</title>
<style>
:root {
  --bg:#0a0e1a; --bg-card:#111827; --border:#1f2937;
  --text:#f8fafc; --text-dim:#94a3b8; --accent:#22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font:16px/1.5 'Inter',-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
.box { width:100%; max-width:400px; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:36px; }
.logo { font:800 22px -apple-system,sans-serif; letter-spacing:-0.02em; margin-bottom:8px; }
.logo span { color:var(--accent); }
h1 { font:700 24px/1.1 -apple-system,sans-serif; letter-spacing:-0.02em; margin-bottom:4px; }
.lead { color:var(--text-dim); font-size:14px; margin-bottom:24px; }
label { display:block; font-size:13px; color:var(--text-dim); margin:14px 0 6px; font-weight:500; }
input { width:100%; padding:11px 14px; background:#0f172a; border:1px solid var(--border); border-radius:10px; color:var(--text); font:inherit; outline:none; }
input:focus { border-color:var(--accent); }
.error { margin-top:14px; padding:10px 14px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#ef4444; font-size:13px; }
.btn { width:100%; margin-top:22px; padding:13px; background:var(--accent); color:#052e16; border:none; border-radius:10px; font:inherit; font-weight:700; cursor:pointer; font-size:15px; }
.foot { margin-top:18px; font-size:13px; color:var(--text-dim); text-align:center; }
.foot a { color:var(--accent); text-decoration:none; }
.help { margin-top:14px; padding:12px; background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.2); border-radius:8px; font-size:12px; color:var(--text-dim); line-height:1.55; }
.help b { color:var(--accent); }
</style>
</head>
<body>

<div class="box">
  <div class="logo">ELH<span>·Coach</span></div>
  <h1>Welcome back.</h1>
  <p class="lead">Sign in to your ELH Coach account.</p>

  <label>Email</label>
  <input id="email" type="email" autocomplete="email" required>
  <label>Password</label>
  <input id="password" type="password" autocomplete="current-password" required>

  <div class="error" id="error" style="display:none"></div>

  <button class="btn" id="submit">Sign in</button>

  <div class="help">
    Coach accounts log in at <b>your-subdomain.elhcoach.app/login</b>.<br>
    This page is for your ELH Coach workspace owner login at the apex domain.
  </div>

  <div class="foot">
    No account yet? <a href="/signup">Start a 14-day trial</a>
  </div>
</div>

<script>
document.getElementById('submit').addEventListener('click', async () => {
  const btn = document.getElementById('submit');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  const r = await fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      email: document.getElementById('email').value.trim().toLowerCase(),
      password: document.getElementById('password').value,
    })
  });
  const d = await r.json().catch(() => ({}));
  if (!r.ok || d.error) {
    err.textContent = d.error || 'Sign-in failed.';
    err.style.display = '';
    btn.disabled = false;
    return;
  }
  // d.tenant_slug is the workspace they own — redirect there
  if (d.tenant_slug) {
    const apex = location.hostname.replace(/^[^.]+\./, '') || location.hostname;
    location.href = `https://${d.tenant_slug}.${apex}/?token=${encodeURIComponent(d.token)}`;
  } else {
    location.href = '/account';
  }
});
</script>

</body>
</html>

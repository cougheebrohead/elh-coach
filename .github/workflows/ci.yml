name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ matrix.python }}' }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy --ignore-missing-imports server.py db.py auth.py billing.py tenants.py ratelimit.py
      - name: Tests
        run: pytest -q tests/

  isolation:
    name: Cross-tenant isolation must pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      - run: pytest -q tests/test_isolation.py

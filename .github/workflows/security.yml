name: Security

# Estate iron-dome — same security gates as FitApp + Headworks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: Python dependency CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit requirements.txt
        run: |
          grep -v "git+https" requirements.txt > /tmp/requirements-audit.txt || true
          pip-audit -r /tmp/requirements-audit.txt --strict --vulnerability-service osv

  gitleaks:
    name: Secret-leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan full history
        run: gitleaks git --config=.gitleaks.toml --redact --verbose --exit-code=1
      - name: Scan working tree
        run: gitleaks dir --config=.gitleaks.toml --redact --verbose --exit-code=1 .

  bandit:
    name: Python static security analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: python -m pip install --upgrade pip bandit
      - name: Run bandit
        # Skips audited as project-wide false positives:
        #   B101 — assert (test convention)
        #   B104 — bind 0.0.0.0 (intentional; container ingress handled by platform)
        #   B310 — urllib_urlopen (every call site is server-constructed URL to known endpoint)
        run: |
          bandit -r . \
            --exclude ./node_modules,./_parking_lot,./scripts,./backups,./.git,./tests,./seed \
            -ll -ii \
            --skip B101,B104,B310

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
